<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patidar Peppermint | WhatsApp Order</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --brown: #2d1a1a; 
            --mint: #00ff88; 
            --wa-green: #25d366;
        }
        body { background: #1a0f0f; color: #f5e6d3; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding-bottom: 90px; }
        
        .header { background: #3d1f1f; padding: 30px 15px; border-bottom: 3px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        h1 { color: var(--gold); margin: 0; font-size: 24px; text-transform: uppercase; }
        .tagline { color: var(--mint); font-size: 14px; margin-top: 5px; }

        /* Search Bar (50+ varieties ke liye zaroori hai) */
        .search-box { margin: 20px; }
        .search-box input { width: 80%; padding: 12px; border-radius: 25px; border: 1px solid var(--gold); background: #2d1a1a; color: white; outline: none; }

        .product-list { 
            padding: 10px; 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            gap: 15px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        
        .card { 
            background: var(--brown); border: 1px solid var(--gold); border-radius: 12px; 
            padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .card h3 { font-size: 18px; margin: 10px 0; color: #fff; }
        .weight { font-size: 13px; color: #bbb; }
        .price { font-size: 22px; color: var(--mint); margin: 10px 0; font-weight: bold; }
        
        /* WhatsApp Button Only */
        .btn-wa { 
            display: flex; align-items: center; justify-content: center;
            background: var(--wa-green); color: white; padding: 10px; 
            text-decoration: none; border-radius: 8px; font-weight: bold; font-size: 14px;
        }
        .btn-wa i { margin-right: 5px; }

        /* Footer Chat Bar */
        .footer-bar {
            position: fixed; bottom: 0; width: 100%; background: #3d1f1f;
            padding: 15px 0; border-top: 2px solid var(--gold); text-align: center;
        }
        .footer-chat {
            background: var(--wa-green); color: white; padding: 12px 40px;
            text-decoration: none; border-radius: 30px; font-weight: bold;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌿 PATIDAR PEPPERMINT</h1>
        <p class="tagline">50+ Homemade Varieties | Wholesale Price</p>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search your favorite chocolate...">
    </div>

    <div class="product-list">
        <div class="card">
            <h3>Mint Dark</h3>
            <p class="weight">100g Pack</p>
            <div class="price">₹199</div>
            <a href="https://wa.me/917383838107?text=I want to order: Mint Dark (100g)" class="btn-wa">Order on WhatsApp</a>
        </div>

        <div class="card">
            <h3>Milk Almond</h3>
            <p class="weight">100g Pack</p>
            <div class="price">₹149</div>
            <a href="https://wa.me/917383838107?text=I want to order: Milk Almond (100g)" class="btn-wa">Order on WhatsApp</a>
        </div>

        </div>

    <div class="footer-bar">
        <a href="https://wa.me/917383838107" class="footer-chat">
            💬 CLICK TO CHAT ON WHATSAPP
        </a>
    </div>

</body>
</html>
