<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patidar Peppermint | Pure Homemade Chocolates</title>
    <style>
        :root { 
            --gold: #d4af37; 
            --brown: #2d1a1a; 
            --mint: #00ff88; /* Peppermint touch */
        }
        body { background: #1a0f0f; color: #f5e6d3; font-family: 'Arial', sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        
        .header { background: #3d1f1f; padding: 40px 20px; border-bottom: 3px solid var(--gold); }
        h1 { color: var(--gold); margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 2px; }
        .tagline { color: var(--mint); font-weight: bold; margin-top: 5px; }
        
        .product-list { 
            padding: 20px; 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
        }
        
        .card { 
            background: var(--brown); border: 1px solid var(--gold); border-radius: 15px; 
            padding: 20px; width: 90%; max-width: 320px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--mint); }
        
        .price { font-size: 26px; color: var(--mint); margin: 10px 0; font-weight: bold; }
        
        /* Buttons */
        .btn-wa { 
            display: block; background: #25d366; color: white; padding: 12px; 
            text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px;
        }
        .btn-call { 
            display: block; background: var(--gold); color: #1a0f0f; padding: 12px; 
            text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px;
        }

        /* Footer */
        .call-footer {
            position: fixed; bottom: 0; width: 100%; background: #3d1f1f;
            display: flex; border-top: 2px solid var(--gold); padding: 12px 0;
        }
        .call-footer a {
            flex: 1; color: var(--gold); text-decoration: none; font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌿 PATIDAR PEPPERMINT</h1>
        <p class="tagline">Premium Home Made Chocolates - Wholesale Price</p>
    </div>

    <div class="product-list">
        <div class="card">
            <h3>kitkat Chocolate</h3>
            <p>Weight: 100g | Refreshing & Rich</p>
            <div class="price">₹199</div>
            <a href="https://wa.me/917383838107?text=Hello Patidar Peppermint, I want to order Mint Dark Chocolate" class="btn-wa">Order on WhatsApp</a>
            <a href="tel:+917383838107" class="btn-call">📞 Call to Order</a>
        </div>

        <div class="card">
            <h3>dairymilk</h3>
            <p>Weight: 100g | Creamy Mint Texture</p>
            <div class="price">₹179</div>
            <a href="https://wa.me/917383838107?text=Hello Patidar Peppermint, I want to order Peppermint Milk Bliss" class="btn-wa">Order on WhatsApp</a>
            <a href="tel:+917383838107" class="btn-call">📞 Call to Order</a>
        </div>
    </div>

    <div class="call-footer">
        <a href="tel:+917383838107">📞 CALL PATIDAR PEPPERMINT</a>
        <a href="https://wa.me/917383838107">💬 WHATSAPP CHAT</a>
    </div>

</body>
</html>
